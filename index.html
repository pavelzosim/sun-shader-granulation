<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Granulation Simulation (HLSL -> WebGL)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #050505; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* UI Panel Styles */
        #ui-panel {
            position: absolute; top: 20px; right: 20px;
            width: 300px; background: rgba(15, 15, 15, 0.9);
            padding: 20px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 10; border: 1px solid #444;
            backdrop-filter: blur(5px);
        }
        #ui-panel h2 { margin-top: 0; font-size: 20px; color: #ffaa00; letter-spacing: 1px; }
        #ui-panel p { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.4; }
        .control-group { margin-bottom: 16px; }
        .control-group label { display: block; font-size: 12px; text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; color: #ccc; }
        .control-group label span.value { color: #ffaa00; font-family: monospace; font-size: 14px; }
        .control-group input[type=range] { width: 100%; cursor: pointer; accent-color: #ffaa00; }
        
        .footer { margin-top: 10px; font-size: 11px; color: #555; border-top: 1px solid #333; padding-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>Solar Granulation</h2>
        <p>Real-time plasma convection simulation based on HLSL procedural noise logic.</p>
        
        <div class="control-group">
            <label>Granule Scale <span id="val-granuleScale" class="value">1.0</span></label>
            <input type="range" id="granuleScale" min="0.5" max="5.0" step="0.01" value="1.0">
        </div>
        
        <div class="control-group">
            <label>Warp Amount <span id="val-warpAmount" class="value">0.18</span></label>
            <input type="range" id="warpAmount" min="0.0" max="1.0" step="0.01" value="0.18">
        </div>
        
        <div class="control-group">
            <label>Boil Speed <span id="val-boilSpeed" class="value">1.0</span></label>
            <input type="range" id="boilSpeed" min="0.0" max="4.0" step="0.01" value="1.0">
        </div>
        
        <div class="control-group">
            <label>Cell Exponent (k) <span id="val-cellExponent" class="value">2.5</span></label>
            <input type="range" id="cellExponent" min="1.0" max="5.0" step="0.01" value="2.5">
        </div>

        <div class="footer">UE 5.7 Procedural Workflow Demo</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- GLOBAL VARIABLES ---
        let scene, camera, renderer, mesh, material;
        const startTime = Date.now();

        // --- SHADERS (GLSL) ---
        const _VS = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const _FS = `
            precision highp float;
            uniform float time;
            uniform float granuleScale;
            uniform float warpAmount;
            uniform float boilSpeed;
            uniform float cellExponent;
            varying vec2 vUv;

            // Simple hash for noise generation
            vec2 hash22(vec2 p) {
                p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
                return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
            }

            // Simplex-like noise for Curl effect
            float noise(vec2 p) {
                const float K1 = 0.366025404;
                const float K2 = 0.211324865;
                vec2 i = floor(p + (p.x + p.y) * K1);
                vec2 a = p - i + (i.x + i.y) * K2;
                vec2 o = (a.x > a.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec2 b = a - o + K2;
                vec2 c = a - 1.0 + 2.0 * K2;
                vec3 h = max(0.5 - vec3(dot(a, a), dot(b, b), dot(c, c)), 0.0);
                vec3 n = h * h * h * h * vec3(dot(a, hash22(i + 0.0)), dot(b, hash22(i + o)), dot(c, hash22(i + 1.0)));
                return dot(n, vec3(70.0));
            }

            // 2D Curl Noise for domain warping (plasma advection)
            vec2 curlNoise(vec2 p) {
                const float e = 0.01;
                float n = noise(p);
                float dx = (noise(p + vec2(e, 0.0)) - n) / e;
                float dy = (noise(p + vec2(0.0, e)) - n) / e;
                return vec2(dy, -dx);
            }

            // Voronoi F1/F2 for cellular structure
            vec2 voronoi(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                float F1 = 8.0, F2 = 8.0;

                for (int y = -1; y <= 1; y++) {
                    for (int x = -1; x <= 1; x++) {
                        vec2 g = vec2(float(x), float(y));
                        vec2 o = hash22(i + g);
                        // Animate cell centers (boiling effect)
                        o = 0.5 + 0.5 * sin(time * boilSpeed * 1.5 + 6.2831 * o);
                        vec2 r = g + o - f;
                        float d = dot(r, r);

                        if (d < F1) {
                            F2 = F1;
                            F1 = d;
                        } else if (d < F2) {
                            F2 = d;
                        }
                    }
                }
                return sqrt(vec2(F1, F2));
            }

            // Blackbody approximation gradient
            vec3 getSunColor(float t) {
                t = clamp(t, 0.0, 1.0);
                vec3 c1 = vec3(0.08, 0.0, 0.0); // Intergranular lanes (dark)
                vec3 c2 = vec3(1.0, 0.25, 0.0); // Mid plasma
                vec3 c3 = vec3(1.0, 0.75, 0.1); // Surface hot
                vec3 c4 = vec3(1.0, 1.0, 0.95); // Peak hot (granule centers)
                
                vec3 color = mix(c1, c2, smoothstep(0.0, 0.25, t));
                color = mix(color, c3, smoothstep(0.25, 0.6, t));
                color = mix(color, c4, smoothstep(0.6, 1.0, t));
                return color;
            }

            void main() {
                // Adjust UV for aspect ratio and scaling
                vec2 p = (vUv - 0.5) * 15.0 * granuleScale;

                // 1. Plasma Advection (Domain Warp)
                vec2 warpP = p * 0.4 + time * boilSpeed * 0.2;
                vec2 curl = curlNoise(warpP);
                vec2 warpedP = p + curl * warpAmount;

                // 2. Procedural Boiling (Animated Voronoi)
                float tOffset = time * boilSpeed * 0.1;
                vec2 finalP = warpedP + vec2(tOffset * 0.7, tOffset * 0.3);
                vec2 vData = voronoi(finalP);
                float F1 = vData.x;
                float F2 = vData.y;

                // 3. Shape Profiling (Photospheric Granulation)
                // pow(1.0 - F1, k) creates flat tops and narrow lanes
                float cell = pow(max(1.0 - F1, 0.0), cellExponent);

                // 4. Intergranular lane glow enhancement
                float lane = clamp((F2 - F1) * 3.0, 0.0, 1.0);
                
                float finalBright = cell + lane * 0.05;

                gl_FragColor = vec4(getSunColor(finalBright), 1.0);
            }
        `;

        // --- APP INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            // Using a simple camera for a full-screen quad
            camera = new THREE.Camera(); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Full-screen plane
            const geometry = new THREE.PlaneBufferGeometry(2, 2);
            
            material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    granuleScale: { value: 1.0 },
                    warpAmount: { value: 0.18 },
                    boilSpeed: { value: 1.0 },
                    cellExponent: { value: 2.5 }
                },
                vertexShader: _VS,
                fragmentShader: _FS
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize, false);
            setupUI();
            animate();
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.time.value = (Date.now() - startTime) * 0.001;
            renderer.render(scene, camera);
        }

        function setupUI() {
            const params = ['granuleScale', 'warpAmount', 'boilSpeed', 'cellExponent'];
            params.forEach(id => {
                const el = document.getElementById(id);
                const display = document.getElementById('val-' + id);
                el.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    display.innerText = val.toFixed(2);
                    material.uniforms[id].value = val;
                });
            });
        }

        // Start the engine
        init();
    </script>
</body>
</html>
